apiVersion: v1
kind: Service
metadata:
  name: {{ include "node.fullname" . }}-geth
  labels:
    {{- include "node.geth.labels" . | nindent 4 }}
spec:
  type: {{ .Values.geth.service.type }}
  selector:
    {{- include "node.geth.selectorLabels" . | nindent 4 }}
  ports:
    - name: rpc
      port: {{ .Values.geth.config.http.port }}
      targetPort: rpc
      protocol: TCP
    - name: ws
      port: {{ .Values.geth.config.ws.port }}
      targetPort: ws
      protocol: TCP
    - name: authrpc
      port: {{ .Values.geth.config.authrpc.port }}
      targetPort: authrpc
      protocol: TCP
    - name: p2p-tcp
      port: {{ .Values.geth.config.p2p.port }}
      targetPort: p2p-tcp
      protocol: TCP
    - name: p2p-udp
      port: {{ .Values.geth.config.p2p.port }}
      targetPort: p2p-udp
      protocol: UDP
    {{- if .Values.geth.config.metrics.enabled }}
    - name: metrics
      port: {{ .Values.geth.config.metrics.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
